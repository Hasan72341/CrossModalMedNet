# CycleGAN 2D Pelvis (Unpaired CT -> MRI)
model:
  architecture: "cyclegan2d"
  region: "pelvis"
  ngf: 64
  ndf: 64
  num_res_blocks: 6
  use_multiscale: true

training:
  epochs: 200
  batch_size: 4
  lr: 0.0002
  lambda_cycle: 10.0
  lambda_identity: 0.5

data:
  image_size: 256
  mode: "2d"
  unpaired: true
