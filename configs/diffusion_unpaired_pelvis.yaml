# Diffusion Unpaired Pelvis (Cycle-Diffusion CT -> MRI)
model:
  architecture: "diffusion_unpaired"
  region: "pelvis"
  base_model: "stabilityai/stable-diffusion-2-1-base"
  lora_rank_unet: 16
  lora_rank_vae: 8
  input_nc: 3
  output_nc: 3

training:
  epochs: 100
  batch_size: 1
  lr: 0.00005
  mixed_precision: "fp16"
  lambda_cycle: 1.0

data:
  image_size: 512
  unpaired: true
  prompt_source: "CT scan"
  prompt_target: "MRI scan"
