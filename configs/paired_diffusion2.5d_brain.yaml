# Paired Diffusion 2.5D Brain (LDM CT -> MRI)
model:
  architecture: "paired_diffusion2.5d"
  region: "brain"
  base_model: "stabilityai/stable-diffusion-2-1-base"
  num_slices: 3

training:
  epochs: 100
  batch_size: 1
  lr: 0.0001

data:
  image_size: 512
  mode: "2.5d"
  unpaired: false
  num_slices: 3
