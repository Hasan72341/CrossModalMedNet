name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate package metadata
        run: |
          python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              tomllib.load(f)
          PY
      - name: Compile core scripts
        run: |
          python -m py_compile \
            app.py \
            models/cyclegan/train.py \
            models/pix2pix/train.py \
            models/diffusion/train.py \
            scripts/inspect_data.py \
            scripts/test_dataset.py \
            scripts/verify_checkpoints.py
